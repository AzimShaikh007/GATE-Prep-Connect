# Setup JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Database (H2 Embedded - File Based)
spring.datasource.url=jdbc:h2:file:./data/gatedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always

# H2 Console (For viewing the generated DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=8080
server.servlet.register-default-servlet=true

# ── Phase 3: Email Notifications (JavaMailSender) ──────────────────────────
# Replace the placeholders below with real SMTP credentials before running.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Set to false so app starts even without valid mail credentials (dev mode)
spring.mail.test-connection=false
